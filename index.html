<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSGO/CS2 终极人格测试</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Chosen Palette: CSGO Dark Theme (Slate/Gray, Neon Yellow/Orange accents) -->
    <!-- Application Structure Plan: 
         1. Landing Screen: Engaging intro to the test.
         2. Quiz Area: Dynamic injection of 50 questions with progress tracking.
         3. Result Dashboard: Calculates dominant trait, shows role description, and renders a Radar Chart of all playstyles.
    -->
    <!-- Visualization & Content Choices:
         - Progress Bar (HTML/CSS): Shows test completion.
         - Interactive Buttons: For answering 4-option questions.
         - Radar Chart (Chart.js/Canvas): Best visualization for multi-dimensional gaming profiles (like "Hexagon stats").
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chart-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; height: 300px; max-height: 400px; }
        @media (min-width: 768px) { .chart-container { height: 400px; } }
        @media (max-width: 380px) {
            .chart-container { height: 250px; }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 4px; }
        .option-btn { min-height: 56px; touch-action: manipulation; }
        @media (max-width: 380px) {
            .option-btn { min-height: 52px; font-size: 0.875rem; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col antialiased">

    <!-- Header -->
    <header class="bg-slate-950 border-b border-slate-800 p-4 text-center shadow-lg">
        <h1 class="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 uppercase tracking-widest">
            CS:GO / CS2 玩家人格鉴定器
        </h1>
    </header>

    <!-- Main Container -->
    <main class="flex-grow flex items-center justify-center p-4 md:p-8">
        <div id="app-container" class="w-full max-w-3xl bg-slate-800 rounded-xl shadow-2xl border border-slate-700 overflow-hidden relative transition-all duration-300">
            
            <!-- 1. Start Screen -->
            <div id="screen-start" class="p-8 md:p-12 text-center space-y-6">
                <div class="text-6xl mb-4">🎮</div>
                <h2 class="text-3xl font-bold text-white">你是哪种类型的 CSer？</h2>
                <p class="text-slate-400 text-lg">包含 50 道真实游戏场景题，测出你是突破手、老六、战术大师</p>
                <div class="pt-6">
                    <button onclick="startQuiz()" class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold py-4 px-10 rounded-full text-xl shadow-[0_0_15px_rgba(234,179,8,0.5)] transition-all transform hover:scale-105 active:scale-95">
                        开始测试 (共50题)
                    </button>
                </div>
            </div>

            <!-- 2. Quiz Screen -->
            <div id="screen-quiz" class="hidden flex flex-col h-full">
                <!-- Progress -->
                <div class="w-full bg-slate-950 h-2">
                    <div id="progress-bar" class="bg-yellow-500 h-2 transition-all duration-300 w-0"></div>
                </div>
                <div class="p-6 md:p-10 flex-grow flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <span id="question-counter" class="text-yellow-500 font-mono font-bold text-lg">1 / 50</span>
                        <span class="text-slate-400 text-sm border border-slate-600 px-2 py-1 rounded">战斗情境</span>
                    </div>
                    
                    <h3 id="question-text" class="text-xl md:text-2xl font-semibold mb-8 text-white leading-relaxed">
                        加载中...
                    </h3>

                    <div id="options-container" class="space-y-3 mt-auto">
                        <!-- Options injected via JS -->
                    </div>
                </div>
            </div>

            <!-- 3. Result Screen -->
            <div id="screen-result" class="hidden p-6 md:p-10 text-center flex flex-col items-center">
                <h2 class="text-xl text-slate-400 font-semibold mb-2">你的 CS 生涯鉴定报告</h2>
                <div class="text-5xl my-2" id="result-icon">🏆</div>
                <h1 id="result-title" class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-4 tracking-wide drop-shadow-md">
                    <!-- Title injected -->
                </h1>
                
                <p id="result-desc" class="text-slate-300 mb-8 max-w-xl mx-auto leading-relaxed text-lg bg-slate-900/50 p-4 rounded-lg border border-slate-700">
                    <!-- Description injected -->
                </p>

                <!-- Chart Container Requirements applied -->
                <div class="chart-container w-full bg-slate-950/50 rounded-xl p-4 border border-slate-700 mb-8">
                    <canvas id="radarChart"></canvas>
                </div>

                <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-full transition-all">
                    再测一次
                </button>
            </div>

        </div>
    </main>

    <!-- JS Logic -->

                { t: "分析战术、讲课、教学道具的技术流。", type: "tactical" },
                { t: "拿着狙击枪秀操作，疯狂甩狙的集锦流。", type: "sniper" },
                { t: "整活不断，节目效果拉满的娱乐主播。", type: "troll" },
                { t: "被对面打自闭，砸键盘的暴躁老哥。", type: "aggressive" }
            ]},
            { q: "遇到对面全起大狙防守：", options: [
                { t: "用烟雾弹把他们的枪线全部封死。", type: "tactical" },
                { t: "我也起狙！对狙不赢不配玩！", type: "sniper" },
                { t: "从地下道或者小路摸过去，绕开大长管。", type: "lone" },
                { t: "勇敢地跳出去吸引火力，然后瞬间暴毙。", type: "piggy" }
            ]},
            { q: "防守方，听到匪徒已经在安放C4了：", options: [
                { t: "从最近的通道快速跑过去抓下包 Timing。", type: "aggressive" },
                { t: "静步靠过去，听信息等待队友汇合一起打回防。", type: "steady" },
                { t: "隔着墙/箱子一顿穿射，强行把下包的人穿死。", type: "forsaken" },
                { t: "手滑切出了燃烧弹扔在自己脚下，阻断了自己的路。", type: "piggy" }
            ]},
            { q: "你拆除C4（拆包）的风格是：", options: [
                { t: "必须先清完所有点位，确保没人再安全拆。", type: "steady" },
                { t: "扔个烟雾弹直接强拆，队友帮架枪。", type: "team" },
                { t: "点一下雷包立刻放开，掏枪反杀拉出来的人。", type: "tactical" },
                { t: "没有钳子，对着C4看了10秒被炸上天。", type: "piggy" }
            ]},
            { q: "当你用手枪局打赢了长枪局：", options: [
                { t: "在公屏打字：“Ez” 或者发个问号“？”", type: "troll" },
                { t: "捡起对面的AK/大狙，美滋滋地保枪。", type: "steady" },
                { t: "继续买P90/吹风机，恶心对面到底。", type: "pp19" },
                { t: "“啊？刚才那个人拿的是AK吗？我以为是ECO局。”", type: "piggy" }
            ]},
            { q: "如果CS2要删除一把武器，你最不想看到谁消失？", options: [
                { t: "AK47，男人的浪漫，爆头的快感。", type: "all" },
                { t: "AWP，一枪制敌的魅力无法替代。", type: "sniper" },
                { t: "P90，这是我的本命神器啊！", type: "pp19" },
                { t: "电击枪！没有它游戏失去了灵魂。", type: "troll" }
            ]},
            { q: "残局处理时，你最依赖的是：", options: [
                { t: "精湛的枪法和预瞄习惯。", type: "all" },
                { t: "超乎常人的意识和地图理解。", type: "tactical" },
                { t: "对面失误，不小心露出破绽。", type: "steady" },
                { t: "运气好，闭着眼睛瞎开火爆头了。", type: "piggy" }
            ]},
            { q: "你在队伍中的语音交流通常是：", options: [
                { t: "简洁明了：“A大两个，残血。”", type: "team" },
                { t: "除了报点一言不发，像个冷酷杀手。", type: "lone" },
                { t: "大吼大叫：“Rush！冲冲冲！别停啊！”", type: "aggressive" },
                { t: "“哎呀我死了...等下，我刚刚在哪死的来着？”", type: "piggy" }
            ]},
            { q: "遇到一个明显的作弊者（陀螺/锁头）：", options: [
                { t: "全队躲在出生点不出去，保枪拖时间等结束。", type: "steady" },
                { t: "开挂是吧？看我起大狙穿门抽你！", type: "forsaken" }, // fighting fire with fire
                { t: "尝试用非常规点位和闪光弹强行打他一个侧身。", type: "tactical" },
                { t: "跑出去找他理论，结果不停地被秒杀复活秒杀。", type: "piggy" }
            ]},
            { q: "如何评价自己的“压枪”水平？", options: [
                { t: "前10发稳如老狗，后20发也能控制在弹道内。", type: "all" },
                { t: "压什么枪，一枪头就完事了。", type: "aggressive" },
                { t: "反正我用冲锋枪/大狙，不需要背步枪弹道。", type: "pp19" },
                { t: "前两发在人身上，后面的全打在云彩上了。", type: "piggy" }
            ]},
            { q: "关于买甲（防弹衣）：", options: [
                { t: "必须全甲！没有头盔就没有安全感。", type: "steady" },
                { t: "没钱就半甲，只要头不被打烂就行。", type: "team" },
                { t: "无甲大狙，极致的玻璃大炮。", type: "sniper" },
                { t: "经常忘了买甲，光着身子就冲出去了。", type: "piggy" }
            ]},
            { q: "单排匹配遇到不会说中文的老外：", options: [
                { t: "用流利的英文或基础报点词汇无缝交流。", type: "team" },
                { t: "直接静音，反正我都是自己玩自己的。", type: "lone" },
                { t: "用拼音或者蹩脚的“Hello A A A”疯狂喊叫。", type: "pp19" },
                { t: "对着他发语音卖萌，虽然对方听不懂。", type: "piggy" }
            ]},
            { q: "当你作为自由人绕后，看到三个敌人的背身：", options: [
                { t: "冷静瞄准，从最后一个开始一个个爆头。", type: "all" },
                { t: "兴奋地直接扫射，结果马枪（压枪失误）被反杀。", type: "aggressive" },
                { t: "掏出刀子，想尝试一次史诗级的三连刀杀。", type: "troll" },
                { t: "不敢开枪，怕打不过，看着他们走过去...", type: "piggy" }
            ]},
            { q: "你觉得影响你上分的最大障碍是：", options: [
                { t: "队友不交流，不配合。", type: "team" },
                { t: "对面的挂太多了，这游戏没法玩。", type: "forsaken" },
                { t: "运气太差，总是被离谱的跑打爆头。", type: "steady" },
                { t: "我自己确实有点菜，经常白给发呆。", type: "piggy" }
            ]},
            { q: "队友掉线，4打5的局面：", options: [
                { t: "接管指挥，安排更紧凑的防守和抱团进攻。", type: "tactical" },
                { t: "变成独狼，在地图各处施加压力，牵扯精力。", type: "lone" },
                { t: "把经济全用来买狙，利用远距离优势补足人数差。", type: "sniper" },
                { t: "我负责在家里挂机发枪，做个移动ATM。", type: "piggy" }
            ]},
            { q: "拿到首杀（First Blood）后你会：", options: [
                { t: "继续前压，把对面的防线彻底撕裂！", type: "aggressive" },
                { t: "立刻退回安全区，建立人数优势慢慢打。", type: "steady" },
                { t: "喷个漆，检视一下武器，装个杯。", type: "troll" },
                { t: "按到了截图键，卡顿了一下被补枪打死了。", type: "piggy" }
            ]},
            { q: "你的常用准星（Crosshair）是：", options: [
                { t: "一个小绿点，或者极小的十字准星。", type: "all" },
                { t: "动态大准星，跑动会扩大的那种。", type: "steady" },
                { t: "只用默认准星，懒得调，能瞄人就行。", type: "team" },
                { t: "巨大圆圈或者极度离谱的搞怪准星。", type: "troll" }
            ]},
            { q: "对于“丢枪给大哥”这件事：", options: [
                { t: "我就是大哥，给我发把AK，带你们飞！", type: "aggressive" },
                { t: "只要能赢，让我全场打辅助起手枪发枪都行。", type: "team" },
                { t: "我自己拿狙才能发挥，谁也不发。", type: "sniper" },
                { t: "想发AK给大哥，结果按错买成了连狙被骂。", type: "piggy" }
            ]},
            { q: "最后一题，你热爱 CS 的理由是：", options: [
                { t: "纯粹的竞技性，享受变强和战胜对手的过程。", type: "all" },
                { t: "和兄弟们一起开黑、研究战术的快乐时光。", type: "team" },
                { t: "开箱子！炼金！我要出暗金咆哮！", type: "troll" },
                { t: "哪怕当个小笨蛋一直死，我也觉得这游戏好玩！", type: "piggy" }
            ]}
        ];

        // Ensure exactly 50 questions
        const questions = questionData.slice(0, 50);

        // --- ROLE DESCRIPTIONS ---
        const roleData = {
            aggressive: { name: "突破手 (Entry Fragger)", desc: "你就像一头猛虎。永远冲在最前面，为了撕裂对面的防线不惜一切代价。你的字典里没有退缩，只有首杀或者首死。" },
            steady: { name: "稳健达人 (Anchor)", desc: "残局大师！你不贪枪，不盲目冲锋。防守时你是最坚固的盾，残局时你是全村的希望。只要你活着，就还有翻盘的可能。" },
            team: { name: "团队大脑 (IGL/Support)", desc: "比起华丽的杀戮，你更享受掌控全局。你熟悉各种道具，善于沟通。没有你的调度，再猛的枪男也只是一盘散沙。" },
            lone: { name: "自由人 (Lurker)", desc: "你是黑暗中的刺客。永远不在主战场，总是从敌人意想不到的地方出现，打乱他们的回防节奏。你的存在让对手如芒在背。" },
            tactical: { name: "战术大师 (Tactician)", desc: "道具覆盖，假打转点。你把这款射击游戏玩成了策略游戏。你喜欢用智商碾压对手，而不是单纯的拼反应。" },
            troll: { name: "整活带师 (Entertainer)", desc: "分可以掉，活不能停！电击枪、刀人、奇怪的走位和喊话。你是队伍里的气氛组，有你的局永远不会无聊。" },
            sniper: { name: "致命狙神 (AWPer)", desc: "给我一把大狙，还你一个奇迹。你对地图的过点和Timing有敏锐的直觉，一枪制敌是你的艺术追求。" },
            pp19: { name: "牛战士/冲锋型 (Run & Gun)", desc: "RUSH B！P90！吹风机！不讲理的跑打是你的信仰，用火力压制一切花里胡哨的战术，主打一个乱拳打死老师傅。" },
            all: { name: "六边形战士 (All-Rounder)", desc: "你就是完美无瑕的 CS 机器。步枪、狙击、道具、意识全能。不论什么位置你都能打出极高的水准，完美！" },
            forsaken: { name: "世一开 (Suspect)", desc: "你的枪法离谱到让人怀疑人生，各种隔墙穿射和神经枪。对面看你的视角一定在疯狂点举报。如果是纯绿玩，那你太可怕了。" },
            piggy: { name: "小笨蛋猪猪 (Piggy)", desc: "全场最可爱的迷路宝贝！闪白队友、自己烧自己、找不着北、人体描边。虽然战绩可能不好看，但你的呆萌给兄弟们带来了无数欢乐（或者血压）！" }
        };

        // --- STATE MANAGEMENT ---
        let currentQIndex = 0;
        let scores = { aggressive:0, steady:0, team:0, lone:0, tactical:0, troll:0, sniper:0, pp19:0, all:0, forsaken:0, piggy:0 };

        // --- LOGIC FUNCTIONS ---
        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            if (currentQIndex >= questions.length) {
                showResults();
                return;
            }

            const q = questions[currentQIndex];
            document.getElementById('question-counter').innerText = `${currentQIndex + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = q.q;
            
            // Progress bar
            const progress = ((currentQIndex) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // Shuffle options for better UX
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left bg-slate-700/50 hover:bg-slate-600 text-white p-4 rounded-lg border border-slate-600 mb-3 transition-colors duration-200 shadow hover:shadow-lg";
                btn.innerHTML = `<span class="text-yellow-500 font-bold mr-2">▶</span> ${opt.t}`;
                btn.onclick = () => handleAnswer(opt.type);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(type) {
            scores[type]++;
            currentQIndex++;
            renderQuestion();
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');

            // Find max score
            let maxType = 'piggy'; // Default fallback
            let maxVal = -1;
            for (const [type, val] of Object.entries(scores)) {
                if (val > maxVal) {
                    maxVal = val;
                    maxType = type;
                }
            }

            // Fallback rules: If piggy has high score but not top, maybe force piggy for fun if they chose it > 10 times?
            if (scores['piggy'] >= 10 && maxType !== 'piggy') {
                maxType = 'piggy'; // Override logic for the hidden Piggy role
            }

            const role = roleData[maxType];
            
            // Icon mapping
            const iconMap = { aggressive:'🔥', steady:'🛡️', team:'🧠', lone:'🥷', tactical:'🗺️', troll:'🤡', sniper:'🎯', pp19:'🏃💨', all:'🌟', forsaken:'🤖', piggy:'🐷' };

            document.getElementById('result-icon').innerText = iconMap[maxType] || '🏆';
            document.getElementById('result-title').innerText = role.name;
            document.getElementById('result-desc').innerText = role.desc;

            drawChart();
        }

        function drawChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            
            // Prepare data for chart
            const labels = ["突破", "稳健", "团队", "老六", "战术", "整活", "狙击", "冲锋", "全能", "可疑", "猪猪"];
            const dataMap = [
                scores.aggressive, scores.steady, scores.team, scores.lone, scores.tactical, 
                scores.troll, scores.sniper, scores.pp19, scores.all, scores.forsaken, scores.piggy
            ];

            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '能力维度',
                        data: dataMap,
                        backgroundColor: 'rgba(234, 179, 8, 0.2)', // Tailwind Yellow-500 with opacity
                        borderColor: 'rgba(234, 179, 8, 1)',
                        pointBackgroundColor: 'rgba(249, 115, 22, 1)', // Tailwind Orange-500
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(249, 115, 22, 1)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            pointLabels: {
                                color: '#cbd5e1', // Slate-300
                                font: { size: 12, family: "'Segoe UI', sans-serif" }
                            },
                            ticks: {
                                display: false, // Hide numeric values on rings
                                min: 0
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }
    </script>
